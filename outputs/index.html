<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>今日の山</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar topbar--home">
        <button class="ghost-button hidden" type="button" id="backButton">戻る</button>
      </header>

      <main>
        <section class="home-screen" id="homeView">
          <form class="search-panel" id="searchForm">
            <div class="hero-copy">
              <p class="home-kicker">関西の日帰り低山ガイド</p>
              <h1>今日の山</h1>
              <p class="home-lead">出発地点と使える時間から、ちょうどいい山を選べます。</p>
            </div>

            <div class="input-group">
              <label class="input-label" for="originInput">出発地点</label>
              <label class="station-search">
                <span aria-hidden="true">⌕</span>
                <input
                  id="originInput"
                  type="text"
                  value="大阪駅"
                  placeholder="大阪駅、京都駅、現在地など"
                  autocomplete="off"
                />
              </label>
            </div>

            <button class="current-button" type="button" data-origin="現在地">
              <span aria-hidden="true">⌖</span>
              現在地を入力
            </button>

            <div class="origin-presets">
              <p>関西の主要地点から</p>
              <div class="origin-grid">
                <button type="button" data-origin="大阪駅">大阪駅</button>
                <button type="button" data-origin="京都駅">京都駅</button>
                <button type="button" data-origin="近鉄奈良駅">近鉄奈良駅</button>
                <button type="button" data-origin="和歌山駅">和歌山駅</button>
                <button type="button" data-origin="大津駅">大津駅</button>
                <button type="button" data-origin="三ノ宮駅">三ノ宮駅</button>
              </div>
            </div>

            <fieldset class="field">
              <legend>使える移動時間</legend>
              <div class="time-options" id="timeOptions">
                <label><input type="radio" name="minutes" value="30" />30分以内</label>
                <label><input type="radio" name="minutes" value="60" checked />31〜60分</label>
                <label><input type="radio" name="minutes" value="90" />61〜90分</label>
                <label><input type="radio" name="minutes" value="120" />91〜120分</label>
                <label><input type="radio" name="minutes" value="150" />121〜150分</label>
                <label><input type="radio" name="minutes" value="180" />151〜180分</label>
                <label><input type="radio" name="minutes" value="210" />181〜210分</label>
                <label><input type="radio" name="minutes" value="240" />211〜240分</label>
              </div>
            </fieldset>

            <button class="primary-button" type="submit">検索する</button>
          </form>
          <p class="home-note">時間はだいたいの目安です。天気や山のようすを見ながら、楽しんでください</p>
        </section>

        <section class="results hidden" id="listView" aria-live="polite">
          <div class="section-heading">
            <div>
              <p class="eyebrow">候補一覧</p>
              <h2 id="resultTitle">おすすめの山</h2>
            </div>
            <p id="resultCount"></p>
          </div>
          <div class="cards" id="mountainCards"></div>
          <div class="empty-state hidden" id="emptyState">
            <h2>条件に合う山がありません</h2>
            <p>移動時間を広げると候補が増えます。主要駅からの目安時間はおおよその計算です。</p>
          </div>
          <div class="list-bottom-actions">
            <button class="detail-button secondary" type="button" id="listBackButton">戻る</button>
          </div>
        </section>

        <section class="detail hidden" id="detailView"></section>
      </main>

      <footer class="site-footer">
        <span>© 2026 今日の山</span>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
